services:
  db:
    image: postgres:16
    container_name: garage-log-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garage_log
    ports:
      - '5432:5432'
    volumes:
      - garage_log_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d garage_log']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: garage-log-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - garage_log_redis:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  garage_log_pg:
  garage_log_redis:
